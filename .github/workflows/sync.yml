name: Sync Codeforces Submissions

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests curl_cffi

      - name: Run fetcher
        env:
          CF_HANDLE: PriyanshuIITGHY2006
          REPO_ROOT: "."
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_API_SECRET: ${{ secrets.CF_API_SECRET }}
        run: python fetch.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "sync: archive new AC submissions [$(date -u +%Y-%m-%d)]"
          git push
