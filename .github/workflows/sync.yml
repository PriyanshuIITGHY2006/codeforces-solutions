name: Sync Codeforces Submissions

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetcher
        env:
          CF_HANDLE: PriyanshuIITGHY2006
          REPO_ROOT: "."
          # Optional: uncomment and set as repo secrets for source code fetching
          # CF_API_KEY: ${{ secrets.CF_API_KEY }}
          # CF_API_SECRET: ${{ secrets.CF_API_SECRET }}
        run: python fetch.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "sync: archive new AC submissions [$(date -u +%Y-%m-%d)]"
          git push
